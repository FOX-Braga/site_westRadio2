; Configurações PHP para HostGator (cPanel / LiteSpeed)
; Substitui o uso problemático de php_value no .htaccess

upload_max_filesize = 25M
post_max_size = 30M
memory_limit = 256M
max_execution_time = 120
max_input_time = 120
display_errors = Off
log_errors = On
error_log = error.log
date.timezone = "America/Sao_Paulo"
